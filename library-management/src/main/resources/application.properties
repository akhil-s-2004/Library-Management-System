spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=akhil
spring.datasource.password=akhil123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port = 8000
server.servlet.context-path=/api/v1
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.org.springframework.security=DEBUG

# ── Mail Configuration (Gmail SMTP) ─────────────────────────────────────────
# Use a Gmail App Password (not your account password).
# To create one: Google Account → Security → 2-Step Verification → App Passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# The email address that receives member contact messages
app.admin.email=your-gmail@gmail.com
